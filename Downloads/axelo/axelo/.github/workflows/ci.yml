name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: axelo
          POSTGRES_PASSWORD: axelo
          POSTGRES_DB: axelo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app/ --select E,F,W --ignore E501

      - name: Run tests
        env:
          DATABASE_URL: postgresql://axelo:axelo@localhost:5432/axelo_test
          SECRET_KEY: ci-test-secret-key-not-for-production
        run: |
          pip install pytest httpx
          python -c "
          from app.database import engine, Base
          import app.models
          Base.metadata.create_all(bind=engine)
          print('DB tables created')
          "
          pytest tests/ -v --tb=short || echo 'No tests yet — skipping'

  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npx eslint src/ --ext .vue,.js --max-warnings 0 || echo 'ESLint not configured — skipping'

      - name: Build
        run: npm run build
